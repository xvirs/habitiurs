name: habitiurs
description: "App de seguimiento de hábitos con IA integrada, auth y sincronización"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  
  # UI y navegación
  cupertino_icons: ^1.0.8
  
  # Manejo de estado
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Base de datos local
  sqflite: ^2.3.0
  path: ^1.9.0
  
  # Firebase & Auth
  firebase_core: ^2.27.0 # ¡Verifica la última en pub.dev!
  firebase_auth: ^4.18.0 # ¡Verifica la última en pub.dev!
  google_sign_in: ^6.2.1 # ¡Verifica la última en pub.dev!
  cloud_firestore: ^4.17.0 # Si la usas, también actualiza
  
  # HTTP y conectividad para AI
  http: ^1.1.2
  connectivity_plus: ^5.0.2
  
  # Utilidades
  intl: ^0.18.1

  # Notificaciones locales
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Persistencia de configuración
  shared_preferences: ^2.2.2

  # Inyección de dependencias
  get_it: ^7.6.7
  flutter_dotenv: ^6.0.0
  flutter_timezone: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  # Assets comentados hasta que los necesites
  assets:
    - .env

flutter_icons:
  android: true
  ios: true
  image_path: "icon.png"
  adaptive_icon_background: "#00FFFFFF" # Puedes cambiar el color de fondo si lo deseas
  adaptive_icon_foreground: "icon.png"