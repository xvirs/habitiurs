name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FLUTTER_VERSION: "3.35.7"
  JAVA_VERSION: "17"

jobs:
  analyze:
    name: Analyze + format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      # Solo bloquea ante ERRORES reales; warnings/infos (imports sin usar,
      # deprecaciones) se reportan pero no tumban el CI. Endurecé cuando limpies.
      - run: flutter analyze --no-fatal-warnings --no-fatal-infos

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter test
